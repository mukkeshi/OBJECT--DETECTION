<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Web Object Detection</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: #f4f4f9; 
            padding: 20px; 
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        h1 { color: #333; }
        .btn { 
            background: #007bff; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px; 
            margin: 10px; 
            font-size: 16px; 
        }
        .btn:hover { background: #0056b3; }
        #video-container { 
            margin-top: 20px; 
            display: none; 
        }
        img, video { 
            max-width: 100%; 
            border-radius: 10px; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>YOLOv8 Web Detection</h1>
    <p>Upload a video to see live object detection.</p>
    
    <form id="videoForm" enctype="multipart/form-data">
        <input type="file" id="videoInput" name="video" accept="video/mp4, video/avi, video/mov" required><br><br>
        <button type="submit" class="btn">Process Video</button>
    </form>

    <div id="video-container">
        <h3>Live Detection Stream</h3>
        <!-- The img tag acts as the stream container -->
        <img id="videoStream" src="" alt="Processing Video...">
    </div>
</div>

<script>
    document.getElementById('videoForm').onsubmit = async function(e) { 
        e.preventDefault(); 
        
        let formData = new FormData(); 
        formData.append('video', document.getElementById('videoInput').files[0]); 
        
        // Show video container
        document.getElementById('video-container').style.display = 'block'; 
        document.getElementById('videoStream').src = ''; 
        document.getElementById('videoStream').alt = 'Uploading and processing...'; 

        try { 
            let response = await fetch('/upload_video', { 
                method: 'POST', 
                body: formData 
            }); 
            
            if(response.ok) { 
                // Get the feed URL from backend
                let feedUrl = await response.text(); 
                // Set img src to the streaming URL endpoint
                document.getElementById('videoStream').src = feedUrl; 
            } else { 
                alert('Upload failed.'); 
            } 
        } catch (err) { 
            console.error('Error:', err); 
        } 
    };
</script>

</body>
</html>
